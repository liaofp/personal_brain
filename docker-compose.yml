services:
  # 1. 控制面：OpenClaw 统一网关
  openclaw-gateway:
    image: crpi-2fu2kfwgnevmjwlu.cn-beijing.personal.cr.aliyuncs.com/openclaw_gateway/openclaw:latest
    container_name: openclaw_gateway
    restart: always
    ports:
      - "${OPENCLAW_PORT}:8000"
    environment:
      - OPENCLAW_CONFIG=/root/.openclaw/openclaw.json
    volumes:
      - ${HOST_PROJECT_PATH}/openclaw.json:/root/.openclaw/openclaw.json:ro
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ${HOST_PROJECT_PATH:-.}/opencode-executor:/app/plugins/opencode-executor
    env_file:
      - .env

  # 2. 运行面与控制面合一：personal_brain 核心业务容器
  personal-brain-runtime:
    build:
      context: ./
      dockerfile: Dockerfile
    image: personal_brain_runtime_base:latest
    container_name: ${PRODUCTION_CONTAINER_NAME}
    restart: always
    # ports:
    #   - "${PERSONAL_BRAIN_PORT}:8000"
    working_dir: /workspace
    volumes:
      - ${HOST_PROJECT_PATH:-.}:/workspace
      - ${HOST_PROJECT_PATH:-.}/data:/workspace/data
    environment:
      - PYTHONPATH=/workspace
      - TZ=Asia/Shanghai
    env_file:
      - .env
    command: >
      sh -c "
      cd /workspace &&
      uv sync --frozen 2>/dev/null || uv sync &&
      python -m src.main
    "