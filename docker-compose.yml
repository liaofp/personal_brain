services:
  # 1. 控制面：OpenClaw 统一网关
  openclaw-gateway:
    image: crpi-2fu2kfwgnevmjwlu.cn-beijing.personal.cr.aliyuncs.com/openclaw_gateway/openclaw:latest
    container_name: openclaw_gateway
    restart: always
    ports:
      - "${OPENCLAW_PORT}:8080"
    environment:
      - HOME=/home/node
      - OPENCLAW_HOME=/home/node
      - OPENCLAW_STATE_DIR=/home/node/.openclaw
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json
      - OPENCLAW_CONFIG_DIR=/home/node/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/home/node/.openclaw/workspace
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - ALLOW_UNCONFIGURED=true
      - NODE_ENV=development
      - OPENCLAW_DEV=true
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ${HOST_PROJECT_PATH}/openclaw.json:/home/node/.openclaw/openclaw.json
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ${HOST_PROJECT_PATH:-.}/opencode-executor:/home/node/.openclaw/plugins/opencode-executor
      - ${SKILLS_DIR:-./skills}/personal-brain-guard:/home/node/.openclaw/skills/personal-brain-guard:ro
    env_file:
      - .env

  # 2. 运行面与控制面合一：personal_brain 核心业务容器
  personal-brain-runtime:
    build:
      context: ./
      dockerfile: Dockerfile
    image: personal_brain_runtime_base:latest
    container_name: ${PRODUCTION_CONTAINER_NAME}
    restart: always
    # ports:
    #   - "${PERSONAL_BRAIN_PORT}:8000"
    working_dir: /workspace
    volumes:
      - ${HOST_PROJECT_PATH:-.}:/workspace
      - ${HOST_PROJECT_PATH:-.}/data:/workspace/data
    environment:
      - PYTHONPATH=/workspace
      - TZ=Asia/Shanghai
    env_file:
      - .env
    command: >
      sh -c "
      cd /workspace &&
      uv sync --frozen 2>/dev/null || uv sync &&
      python -m src.main
      "