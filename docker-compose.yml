services:
  # 1. OpenClaw 网关服务（高可用、高隔离版）
  openclaw-gateway:
    image: crpi-2fu2kfwgnevmjwlu.cn-beijing.personal.cr.aliyuncs.com/openclaw_gateway/openclaw:latest
    container_name: openclaw-gateway
    hostname: openclaw-gateway
    restart: always
    user: root
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /root
      OPENCLAW_HOME: /root
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /root/.openclaw
      OPENCLAW_CONFIG_PATH: /root/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /root/.openclaw
      OPENCLAW_WORKSPACE_DIR: /root/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
    volumes:
      - ./data/openclaw:/root/.openclaw
    ports:
      - "18001:18001"
    networks:
      - openclaw-net

  # 2. Docker API 安全代理服务 (用于让 Agent 安全地控制沙箱和生产容器)
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: pb-docker-proxy
    restart: always
    environment:
      # 放宽最小必要权限，允许 Agent 创建、销毁测试沙箱容器和清理卷
      CONTAINERS: 1
      IMAGES: 1
      VOLUMES: 1
      NETWORKS: 1
      POST: 1
      DELETE: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - openclaw-net

  # 3. Personal Brain 核心业务与控制面服务
  personal-brain:
    image: crpi-2fu2kfwgnevmjwlu.cn-beijing.personal.cr.aliyuncs.com/openclaw_gateway/openclaw:latest
    container_name: personal-brain
    hostname: personal-brain
    restart: always
    working_dir: /pb
    # 彻底关闭 --reload 防火墙自残隐患，采用标准生产启动。后续由控制面平滑执行重启
    command: ["uvicorn", "api_server:app", "--host", "0.0.0.0", "--port", "18000"]
    env_file:
      - path: .env
        required: false
    environment:
      - TERM=xterm-256color
      # 注入 Docker 代理，使容器内部的 docker-py 客户端能跟宿主机 Docker 通信
      - DOCKER_HOST=tcp://pb-docker-proxy:2375
      
      # ==========================================
      # GitHub 自动化工作流凭证管理（跨平台统一 Token 认证）
      # ==========================================
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # 远程仓库地址示例：github.com/your_username/your_repo
      - GITHUB_REPO_URL=${GITHUB_REPO_URL}
      # 配置 Agent 专属提交者信息，不再依赖宿主机的 .gitconfig
      - GIT_AUTHOR_NAME=OpenClaw-Agent
      - GIT_AUTHOR_EMAIL=agent@openclaw.io
    volumes:
      # 挂载工作目录，便于代码实时覆写与本地持久化
      - .:/pb:rw
    ports:
      - "18000:18000"
    networks:
      - openclaw-net
    depends_on:
      - docker-proxy

networks:
  openclaw-net:
    driver: bridge