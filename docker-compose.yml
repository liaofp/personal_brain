# OpenClaw + Personal Brain Docker Compose 部署配置
# LLM 模型使用 Kimi Code
#
# 使用方法:
#   1. 复制 .env.example 为 .env，填写必要配置
#   2. docker compose up -d
#   3. 访问 Web UI: http://localhost:18789
#   4. Personal Brain API: http://localhost:18000

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    hostname: openclaw-gateway
    restart: unless-stopped
    user: root
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /root
      OPENCLAW_HOME: /root
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /root/.openclaw
      OPENCLAW_CONFIG_PATH: /root/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /root/.openclaw
      OPENCLAW_WORKSPACE_DIR: /root/.openclaw/workspace
      # Gateway 认证令牌（必须设置，否则无法绑定到 0.0.0.0）
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-openclaw-gateway}
      # Anthropic API Key（通过 Kimi Code 代理）
      ANTHROPIC_API_KEY: ${ANTHROPIC_AUTH_TOKEN:-}
      # 其他可选提供商密钥
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TZ: ${TZ:-Asia/Shanghai}
      PERSONAL_BRAIN_HOST: 0.0.0.0
      PERSONAL_BRAIN_PORT: 18000
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./.openclaw-config}:/root/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./.openclaw-workspace}:/root/.openclaw/workspace
      - ./openclaw.json:/root/.openclaw/openclaw.json:ro
      - .:/pb:rw
      - ${PERSONAL_BRAIN_DATA_DIR:-./data}:/pb/data
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      # 注意：Personal Brain API (18000) 不映射到宿主机，仅容器内部访问
      # OpenClaw 通过容器内 localhost:18000 调用 API
    command: >
      sh -c '
      echo "[Personal Brain] 安装 Python 依赖...";
      apt-get update -qq && apt-get install -y -qq python3-pip &&
      pip3 install --break-system-packages --no-cache-dir sqlalchemy==2.0.49 fastapi uvicorn pydantic;
      echo "[Personal Brain] Python 依赖安装完成";
      echo "[Personal Brain] 启动 HTTP API 服务...";
      cd /pb && python3 api_server.py &
      echo "[Personal Brain] 服务已启动在 http://0.0.0.0:18000";
      echo "[OpenClaw] 启动 Gateway...";
      cd /app && exec node openclaw.mjs gateway --bind lan --port 18789
      '
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\" && python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:18000/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    user: root
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /root
      OPENCLAW_HOME: /root
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /root/.openclaw
      OPENCLAW_CONFIG_PATH: /root/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /root/.openclaw
      OPENCLAW_WORKSPACE_DIR: /root/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      BROWSER: echo
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./.openclaw-config}:/root/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./.openclaw-workspace}:/root/.openclaw/workspace
      - ./openclaw.json:/root/.openclaw/openclaw.json:ro
      - .:/pb:rw
      - ${PERSONAL_BRAIN_DATA_DIR:-./data}:/pb/data
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    stdin_open: true
    tty: true
    entrypoint: ["tini", "-s", "--"]
    command: ["node", "openclaw.mjs"]
    profiles:
      - cli
    depends_on:
      - openclaw-gateway

networks:
  openclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
