name: Sync GHCR Image to Aliyun

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 0 * * *' # 每天午夜自动同步一次，保证 latest 是最新的

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    # 1. 登录 GHCR
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 2. 登录阿里云北京个人版仓库
    - name: Login to Aliyun ACR
      uses: docker/login-action@v3
      with:
        registry: crpi-2fu2kfwgnevmjwlu.cn-beijing.personal.cr.aliyuncs.com
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    # 3. 核心同步逻辑：自动截取反斜线右侧内容
    - name: Pull, Tag and Push Multiple Images
      run: |
        # 现在的数组只需要纯粹的源镜像完整地址即可，去掉了硬编码的管道符 |
        IMAGES=(
          "ghcr.io/openclaw/openclaw:latest"
          "ghcr.io/anomalyco/opencode:latest"
          "docker.io/library/python:3.12-slim"
          "ghcr.io/astral-sh/uv:latest"
        )
        
        REGISTRY_ALIYUN="crpi-2fu2kfwgnevmjwlu.cn-beijing.personal.cr.aliyuncs.com"
        NAMESPACE="openclaw_gateway"
        
        for SOURCE_IMAGE in "${IMAGES[@]}"; do
          # 使用 Shell 内置的字符串替换 ${var##*/} 
          # 它的作用是：删掉从左往右直到最后一个反斜线 / 的所有内容，只留下右边的部分
          TARGET_NAME=${SOURCE_IMAGE##*/}
          
          echo "--------------------------------------------------------"
          echo "开始同步: ${SOURCE_IMAGE} -> ${TARGET_NAME}"
          echo "--------------------------------------------------------"
          
          # 1. 拉取原始镜像
          echo "正在拉取: ${SOURCE_IMAGE}"
          docker pull ${SOURCE_IMAGE}
          
          # 2. 修改 Tag（注意：这里去掉了原本写死的 :latest，因为 TARGET_NAME 自带了 Tag 标签）
          TARGET_IMAGE="${REGISTRY_ALIYUN}/${NAMESPACE}/${TARGET_NAME}"
          echo "正在修改 Tag 为: ${TARGET_IMAGE}"
          docker tag ${SOURCE_IMAGE} ${TARGET_IMAGE}
          
          # 3. 推送到阿里云
          echo "正在推送到阿里云..."
          docker push ${TARGET_IMAGE}
          
          echo "✅ ${TARGET_NAME} 同步完成！"
        done

    # 4. 运行日志无痕自毁
    - name: Self Destruct Action Logs
      if: always() 
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "=== 正在触发无痕自毁程序 ==="
        gh run delete ${{ github.run_id }} --repo ${{ github.repository }}
        echo "=== 自毁指令已发出 ==="