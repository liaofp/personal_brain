name: Sync GHCR Image to Aliyun

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 0 * * *' # 每天午夜自动同步一次，保证 latest 是最新的

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    # 1. 登录 GHCR
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 2. 登录阿里云北京个人版仓库
    - name: Login to Aliyun ACR
      uses: docker/login-action@v3
      with:
        registry: crpi-2fu2kfwgnevmjwlu.cn-beijing.personal.cr.aliyuncs.com
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    # 3. 核心三步走：解析不同来源的镜像并同步
    - name: Pull, Tag and Push Multiple Images
      run: |
        # 定义镜像对应关系，格式为 "源镜像完整地址|阿里云目标镜像名"
        IMAGES=(
          "ghcr.io/openclaw/openclaw:latest|openclaw"
          "ghcr.io/anomalyco/opencode:latest|opencode"
          "docker.io/library/python:3.12-slim|python:3.12-slim"
        )
        
        REGISTRY_ALIYUN="crpi-2fu2kfwgnevmjwlu.cn-beijing.personal.cr.aliyuncs.com"
        NAMESPACE="openclaw_gateway"
        
        for ITEM in "${IMAGES[@]}"; do
          # 使用 | 作为分隔符，拆分出源地址和目标名
          SOURCE_IMAGE=$(echo "$ITEM" | cut -d'|' -f1)
          TARGET_NAME=$(echo "$ITEM" | cut -d'|' -f2)
          
          echo "--------------------------------------------------------"
          echo "开始同步: ${SOURCE_IMAGE} -> ${TARGET_NAME}:latest"
          echo "--------------------------------------------------------"
          
          # 1. 拉取原始镜像
          echo "正在拉取: ${SOURCE_IMAGE}"
          docker pull ${SOURCE_IMAGE}
          
          # 2. 修改 Tag
          TARGET_IMAGE="${REGISTRY_ALIYUN}/${NAMESPACE}/${TARGET_NAME}:latest"
          echo "正在修改 Tag 为: ${TARGET_IMAGE}"
          docker tag ${SOURCE_IMAGE} ${TARGET_IMAGE}
          
          # 3. 推送到阿里云
          echo "正在推送到阿里云..."
          docker push ${TARGET_IMAGE}
          
          echo "✅ ${TARGET_NAME} 同步完成！"
        done

    # 4. 运行日志无痕自毁
    - name: Self Destruct Action Logs
      if: always() 
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "=== 正在触发无痕自毁程序 ==="
        
        gh run delete ${{ github.run_id }}
        echo "=== 自毁指令已发出 ==="